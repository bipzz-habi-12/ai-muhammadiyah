<script>
        function switchTab(method) {
            const tabPassword = document.getElementById('tab-password');
            const tabOtp = document.getElementById('tab-otp');
            const passwordContainer = document.getElementById('password-container');
            const passwordInput = document.getElementById('password');

            if (method === 'password') {
                tabPassword.classList.add('bg-primary', 'text-on-primary');
                tabPassword.classList.remove('text-on-surface-variant', 'hover:bg-surface-variant/50');
                
                tabOtp.classList.remove('bg-primary', 'text-on-primary');
                tabOtp.classList.add('text-on-surface-variant', 'hover:bg-surface-variant/50');
                
                passwordContainer.style.display = 'flex';
                passwordInput.setAttribute('required', '');
            } else {
                tabOtp.classList.add('bg-primary', 'text-on-primary');
                tabOtp.classList.remove('text-on-surface-variant', 'hover:bg-surface-variant/50');
                
                tabPassword.classList.remove('bg-primary', 'text-on-primary');
                tabPassword.classList.add('text-on-surface-variant', 'hover:bg-surface-variant/50');
                
                passwordContainer.style.display = 'none';
                passwordInput.removeAttribute('required');
            }
        }

        // Simple entrance animation
        document.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('.auth-card');
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                card.style.transition = 'all 0.6s cubic-bezier(0.22, 1, 0.36, 1)';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
